<div x-data="dateRangePicker('{{ date_from|default:"" }}', '{{ date_to|default:"" }}')"
     class="flex flex-col gap-2 w-full">
    <!-- Date Inputs Row -->
    <div class="flex items-center gap-2">
        <!-- Date range -->
        <div class="flex items-center gap-1">
            <input type="date"
                   name="date_from"
                   x-model="dateFrom"
                   class="input outline-none text-neutral w-full md:w-40" />
            <span class="text-base-content/40 font-bold px-1">〜</span>
            <input type="date"
                   name="date_to"
                   x-model="dateTo"
                   class="input outline-none text-neutral w-full md:w-40" />
        </div>
        <!-- Search Action -->
        <div class="flex items-center gap-2 w-full md:w-auto justify-end md:justify-start">
            <button type="submit" class="btn-search">
                <i class="fa-solid fa-magnifying-glass"></i>検索
            </button>
            <button type="button" @click="resetAll()" class="btn-clear text-xs">リセット</button>
        </div>
    </div>
    <!-- Year Selector -->
    <div class="date-month-bar">
        <select x-model="fiscalYear"
                @change="setYear($event.target.value)"
                class="select select-sm outline-none w-full md:w-32">
            <template x-for="y in years" :key="y">
                <option :value="y" x-text="y + '年度'"></option>
            </template>
        </select>
        <div class="w-px h-4 bg-base-300 mx-1 self-center"></div>
        <!-- Monthly Selector Row -->
        <template x-for="(label, index) in ['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月','3月']"
                  :key="index">
            <button type="button"
                    @click="setMonth(index)"
                    :class="{'active': isMonthActive(index)}"
                    class="btn-month"
                    x-text="label"></button>
        </template>
        <div class="w-px h-4 bg-base-300 mx-1 self-center"></div>
        <button type="button" @click="setFullYear()" class="btn-period-all">全期間</button>
    </div>
</div>
