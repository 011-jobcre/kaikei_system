<div class="flex flex-col lg:flex-row gap-4 w-fit">
    <fieldset class="fieldset flex flex-wrap items-center p-2 rounded-box bg-base-100 border border-base-300">
        <legend class="fieldset-legend opacity-60">期間指定</legend>
        <!-- Year Selector -->
        <div class="w-full lg:w-32">
            <select x-model="fiscalYear"
                    @change="setYear($event.target.value)"
                    class="select select-sm outline-none w-full">
                <template x-for="y in years" :key="y">
                    <option :value="y" x-text="y + '年度'"></option>
                </template>
            </select>
        </div>
        <div class="hidden lg:block w-px h-6 bg-base-300 mx-2 self-center"></div>
        <!-- Monthly Fast Selectors -->
        <template x-for="(label, index) in ['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月','3月']"
                  :key="index">
            <button type="button"
                    @click="setMonth(index)"
                    :class="{'active': isMonthActive(index)}"
                    class="btn-month"
                    x-text="label"></button>
        </template>
        <div class="hidden lg:block w-px h-4 bg-base-300 mx-1 self-center"></div>
        <!-- All Periods Button -->
        <button type="button"
                @click="setFullYear()"
                class="btn-submit-outline btn-xs">全期間</button>
        <div class="hidden lg:block w-px h-4 bg-base-300 mx-1 self-center"></div>
        <!-- Date Range Inputs -->
        <div class="flex flex-row items-center gap-1 w-full lg:flex-1">
            <input type="date"
                   name="date_from"
                   x-model="dateFrom"
                   class="input input-sm outline-none text-neutral w-full lg:w-40" />
            <span class="hidden lg:block text-base-content/40 font-bold px-1">〜</span>
            <input type="date"
                   name="date_to"
                   x-model="dateTo"
                   class="input input-sm outline-none text-neutral w-full lg:w-40" />
        </div>
    </fieldset>
</div>
