{% load static %}
<!DOCTYPE html>
<html lang="ja" data-theme="mytheme">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            {% block title %}
                会計システム
            {% endblock title %}
        </title>
        <meta name="description" content="社内用会計システム — 日本の会計基準に準拠した複式簿記システム" />
        <meta name="keywords" content="会計システム, 複式簿記, 勘定科目, 財務諸表, 日本基準" />
        <!-- Compiled Tailwind + DaisyUI stylesheet (built by npm run dev) -->
        <link rel="stylesheet" href="{% static 'css/output.css' %}" />
        <!-- Tom Select: searchable dropdown library for account/subject pickers -->
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css" />
        <!-- Google Fonts: Inter (Latin) + Noto Sans JP (Japanese) -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+JP:wght@100..900&display=swap"
              rel="stylesheet" />
        <!-- Font Awesome 6 Free: icon set used throughout the UI -->
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        {% block extra_head %}
        {% endblock extra_head %}
    </head>
    <body class="min-h-screen bg-base-100">
        {% block body %}
        {% endblock body %}
        <!-- HTMX: partial-page update engine for modals, list refreshes, balance bar -->
        <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
        <!-- Alpine.js: lightweight reactivity for balance calculation and UI state -->
        <script defer
                src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
        <!-- Tom Select: enhances <select> elements with search and keyboard nav -->
        <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
        <!-- HTMX ↔ Django CSRF integration + modal lifecycle management -->
        <script>
            document.addEventListener('DOMContentLoaded', () => {

                // ── CSRF token ───────────────────────────────────────────────────────
                // Read the CSRF token from Django's cookie and attach it to every
                // HTMX POST/PUT/DELETE request via the hx-headers attribute on <body>.
                const csrfToken = document.cookie.split(';')
                    .find(c => c.trim().startsWith('csrftoken='))
                    ?.split('=')[1];
                if (csrfToken) {
                    document.body.setAttribute(
                        'hx-headers',
                        JSON.stringify({
                            'X-CSRFToken': csrfToken
                        })
                    );
                }

                // ── Modal auto-close on success ──────────────────────────────────────
                // When a modal form POSTs successfully and the server responds with
                // the header HX-Trigger: refreshList, close the open modal.
                document.addEventListener('htmx:afterRequest', (evt) => {
                    if (evt.detail.xhr.status === 200) {
                        const hxTrigger = evt.detail.xhr.getResponseHeader('HX-Trigger');
                        if (hxTrigger && hxTrigger.includes('refreshList')) {
                            const modal = document.getElementById('htmx-modal');
                            if (modal) modal.remove();
                            try {
                                updateMessages();
                            } catch (e) {
                                console.error('Failed to update messages after modal submission:', e);
                            }
                        }
                    }
                });

                // ── Flash message refresher ──────────────────────────────────────────
                // After a modal save succeeds, refetch Django's flash messages and
                // inject them into the page without a full reload.
                function updateMessages() {
                    // Inline messages panel (persistent, inside page content)
                    fetch('/_messages/?format=inline')
                        .then(r => r.text())
                        .then(html => {
                            const flash = document.getElementById('flash-messages');
                            if (flash) flash.innerHTML = html;
                        });
                    // Transient toast notifications (appended to <body>)
                    fetch('/_messages/?format=toast')
                        .then(r => r.text())
                        .then(html => {
                            if (html && html.trim()) {
                                document.body.insertAdjacentHTML('beforeend', html);
                            }
                        });
                }

                // ── refreshList custom event ─────────────────────────────────────────
                // Fired by HTMX when the server sends HX-Trigger: refreshList.
                // Closes any open modal and refreshes flash messages.
                document.addEventListener('refreshList', () => {
                    const modal = document.getElementById('htmx-modal');
                    if (modal) modal.remove();
                    updateMessages();
                });
            });            
        </script>
        {% block extra_scripts %}
        {% endblock extra_scripts %}
    </body>
</html>
