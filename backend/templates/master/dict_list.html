{% extends "layout_main.html" %}
{% block title %}
    仕訳辞書マスタ | 会計システム
{% endblock title %}
{% block page_header %}
    仕訳辞書マスタ
{% endblock page_header %}
{% block content %}
    <div class="space-y-4">
        <!-- Toolbar: search controls + new-record button -->
        <div class="flex flex-col lg:flex-row items-stretch lg:items-center justify-between gap-3 bg-base-100 p-3 rounded-box shadow-sm border border-base-300">
            <form method="get"
                  class="flex flex-wrap lg:flex-nowrap items-center gap-2 w-full">
                <!-- Keyword search: matches pattern name or shortcut key -->
                <input type="text"
                       name="q"
                       value="{{ q }}"
                       placeholder="辞書名・検索キーで検索"
                       class="input outline-none text-neutral w-full lg:w-1/3" />
                <div class="flex items-center gap-2 w-full lg:w-auto justify-end lg:justify-start">
                    <button type="submit" class="btn-search">
                        <i class="fa-solid fa-magnifying-glass"></i>検索
                    </button>
                    <a href="{% url 'master:dict-list' %}" class="btn-clear">クリア</a>
                </div>
            </form>
            <!-- Open the create modal via HTMX -->
            {% if is_admin %}
                <button hx-get="{% url 'master:dict-create' %}"
                        hx-target="body"
                        hx-swap="beforeend"
                        class="btn-submit">
                    <i class="fa-solid fa-plus"></i>新規登録
                </button>
            {% endif %}
        </div>
        <!-- Data Table: HTMX-enabled for dynamic updates -->
        {% include "master/partials/dict_list_table.html" %}
    </div>
{% endblock content %}
