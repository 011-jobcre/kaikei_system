{% extends "layout_main.html" %}
{% block title %}
    勘定科目マスタ | 会計システム
{% endblock title %}
{% block page_header %}
    勘定科目マスタ
{% endblock page_header %}
{% block content %}
    <div class="space-y-4">
        <!-- Toolbar: search/filter controls + new-record button -->
        <div class="flex flex-col md:flex-row items-stretch md:items-center justify-between gap-3 bg-base-100 p-4 rounded-box shadow-sm border border-base-300">
            <form method="get"
                  class="flex flex-wrap md:flex-nowrap items-center gap-2 w-full">
                <!-- Keyword search: matches account code or name -->
                <input type="text"
                       name="q"
                       value="{{ q }}"
                       placeholder="コード・勘定科目名で検索"
                       class="input outline-none text-neutral w-full md:w-1/5" />
                <!-- Filter by hierarchy level -->
                <label class="select outline-none cursor-pointer w-full md:w-1/5">
                    <span class="label min-w-20">分類</span>
                    <select name="level">
                        <option value="">全て</option>
                        <option value="1" {% if level_filter == "1" %}selected{% endif %}>大分類</option>
                        <option value="2" {% if level_filter == "2" %}selected{% endif %}>中分類</option>
                        <option value="3" {% if level_filter == "3" %}selected{% endif %}>小分類</option>
                        <option value="4" {% if level_filter == "4" %}selected{% endif %}>詳細</option>
                    </select>
                </label>
                <!-- Filter by debit/credit classification -->
                <label class="select outline-none cursor-pointer w-full md:w-1/5">
                    <span class="label min-w-20">貸借区分</span>
                    <select name="taisha">
                        <option value="">全て</option>
                        {% for val, name in taisha_choices %}
                            <option value="{{ val }}" {% if taisha_filter == val %}selected{% endif %}>{{ name }}</option>
                        {% endfor %}
                    </select>
                </label>
                <div class="flex items-center gap-2 w-full md:w-auto justify-end md:justify-start">
                    <button type="submit" class="btn-search">
                        <i class="fa-solid fa-magnifying-glass"></i>検索
                    </button>
                    <a href="{% url 'master:kanjo-list' %}" class="btn-clear">クリア</a>
                </div>
            </form>
            <!-- Open the create modal via HTMX — injects into <body> as beforeend -->
            {% if is_admin %}
                <button hx-get="{% url 'master:kanjo-create' %}"
                        hx-target="body"
                        hx-swap="beforeend"
                        class="btn-submit">
                    <i class="fa-solid fa-plus"></i>新規登録
                </button>
            {% endif %}
        </div>
        <!-- Data Table: HTMX-enabled for dynamic updates -->
        {% include "master/partials/kanjo_list_table.html" %}
    </div>
{% endblock content %}
