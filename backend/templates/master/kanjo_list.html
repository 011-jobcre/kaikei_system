{% extends "layout_main.html" %}
{% block title %}
    勘定科目マスタ | 会計システム
{% endblock title %}
{% block page_header %}
    勘定科目マスタ
{% endblock page_header %}
{% block content %}
    <div class="space-y-4" x-data>
        <!-- 上部ツールバー -->
        <div class="flex flex-col md:flex-row items-stretch md:items-center justify-between gap-4 bg-base-100 p-4 rounded-box shadow-sm">
            <form method="get"
                  class="flex flex-wrap md:flex-nowrap items-center gap-2 flex-1">
                <input type="text"
                       name="q"
                       value="{{ q }}"
                       placeholder="コード・科目名で検索"
                       class="input input-bordered input-md w-full md:w-48" />
                <div class="flex items-center gap-1 w-full md:w-64">
                    <select name="level" class="select select-bordered select-md flex-1">
                        <option value="">全て</option>
                        <option value="1" {% if level_filter == "1" %}selected{% endif %}>大分類</option>
                        <option value="2" {% if level_filter == "2" %}selected{% endif %}>中分類</option>
                        <option value="3" {% if level_filter == "3" %}selected{% endif %}>小分類</option>
                        <option value="4" {% if level_filter == "4" %}selected{% endif %}>詳細</option>
                    </select>
                    <select name="taisha" class="select select-bordered select-md flex-1">
                        <option value="">全て</option>
                        {% for val, name in taisha_choices %}
                            <option value="{{ val }}" {% if taisha_filter == val %}selected{% endif %}>{{ name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="flex gap-2 md:flex-1 ml-auto">
                    <button type="submit" class="btn-ghost-search">
                        <i class="fa-solid fa-magnifying-glass text-md"></i>検索
                    </button>
                    <a href="{% url 'master:kanjo-list' %}" class="btn-ghost-clear">クリア</a>
                </div>
            </form>
            <button hx-get="{% url 'master:kanjo-create' %}"
                    hx-target="body"
                    hx-swap="beforeend"
                    class="btn btn-primary btn-md gap-2 w-full md:w-auto">
                <i class="fa-solid fa-plus text-md"></i>
                新規登録
            </button>
        </div>
        <!-- リスト表示 -->
        {% include "master/partials/kanjo_table.html" %}
    </div>
{% endblock content %}
