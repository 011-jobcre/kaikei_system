{% extends "layout_main.html" %}
{% block title %}
    取引先マスタ | 会計システム
{% endblock title %}
{% block page_header %}
    取引先マスタ
{% endblock page_header %}
{% block content %}
    <div class="space-y-4">
        <!-- Toolbar: keyword search + new-record button -->
        <div class="flex flex-col md:flex-row items-stretch md:items-center justify-between gap-3 bg-base-100 p-4 rounded-box shadow-sm border border-base-300">
            <form method="get" class="flex flex-wrap items-center gap-2">
                <!-- Keyword search: matches business partner code or name -->
                <input type="text"
                       name="q"
                       value="{{ request.GET.q }}"
                       placeholder="コード・取引先名検索"
                       class="input outline-none text-neutral flex-1" />
                <div class="flex items-center gap-2 w-full md:w-auto justify-end md:justify-start">
                    <button type="submit" class="btn-search">
                        <i class="fa-solid fa-magnifying-glass"></i>検索
                    </button>
                    <a href="{% url 'master:torihiki-list' %}" class="btn-clear">クリア</a>
                </div>
            </form>
            {% if is_admin %}
                <button hx-get="{% url 'master:torihiki-create' %}"
                        hx-target="body"
                        hx-swap="beforeend"
                        class="btn-submit">
                    <i class="fa-solid fa-plus"></i>新規登録
                </button>
            {% endif %}
        </div>
        <!-- Data Table: HTMX-enabled for dynamic updates -->
        {% include "master/partials/torihiki_list_table.html" %}
    </div>
{% endblock content %}
