{% extends "layout_main.html" %}
{% block title %}
    部門マスタ | 会計システム
{% endblock title %}
{% block page_header %}
    部門マスタ
{% endblock page_header %}
{% block content %}
    <div class="space-y-4" x-data>
        <!-- 上部ツールバー -->
        <div class="flex flex-col md:flex-row items-stretch md:items-center justify-between gap-4 bg-base-100 p-4 rounded-box shadow-sm">
            <form method="get" class="flex items-center gap-2">
                <input type="text"
                       name="q"
                       value="{{ request.GET.q }}"
                       placeholder="コード・部門名検索"
                       class="input input-bordered input-md flex-1 w-48" />
                <button type="submit" class="btn-ghost-search">
                    <i class="fa-solid fa-magnifying-glass text-md"></i>検索
                </button>
                <a href="{% url 'master:bumon-list' %}" class="btn-ghost-clear">クリア</a>
            </form>
            <button hx-get="{% url 'master:bumon-create' %}"
                    hx-target="body"
                    hx-swap="beforeend"
                    class="btn btn-primary btn-md gap-2 w-full md:w-auto">
                <i class="fa-solid fa-plus text-md"></i>
                新規登録
            </button>
        </div>
        <!-- リスト表示 -->
        {% include "master/partials/bumon_table.html" %}
    </div>
{% endblock content %}
