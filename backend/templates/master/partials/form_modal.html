<!-- Generic HTMX modal for master-data create/edit forms.
     Injected into <body> via hx-target="body" hx-swap="beforeend".
     The 'title' and 'action_url' context variables must be provided by the view. -->
<dialog id="htmx-modal" class="modal modal-open">
    <div class="modal-box w-11/12 max-w-2xl relative">
        <!-- Close button: removes the dialog element from the DOM entirely -->
        <button onclick="document.getElementById('htmx-modal').remove()"
                class="btn-x-close">✕</button>
        <h3 class="font-bold text-xl mb-4">{{ title }}</h3>
        <form method="post"
              action="{{ action_url }}"
              hx-post="{{ action_url }}"
              hx-target="#htmx-modal"
              hx-swap="innerHTML"
              id="modal-form"
              novalidate>
            {% csrf_token %}
            <div class="space-y-4">
                {% for field in form %}
                    <div class="form-control">
                        <label class="label pb-2" for="{{ field.id_for_label }}">
                            <span class="font-medium text-neutral">
                                {{ field.label }}
                                {% if field.field.required %}<span class="text-error ml-1">*</span>{% endif %}
                            </span>
                        </label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="label pt-1 text-sm">
                                <span class="text-error flex items-center gap-1">
                                    <i class="fa-solid fa-circle-exclamation"></i>
                                    {{ field.errors|join:", " }}
                                </span>
                            </div>
                        {% endif %}
                        {% if field.help_text %}
                            <div class="label pt-1">
                                <span class="text-info/50 text-sm">{{ field.help_text }}</span>
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>
            <div class="modal-action justify-end gap-3">
                <button type="button"
                        onclick="document.getElementById('htmx-modal').remove()"
                        class="btn-cancel">キャンセル</button>
                <button type="submit" class="btn-save">
                    <i class="fa-regular fa-floppy-disk"></i>保存
                </button>
            </div>
        </form>
    </div>
    <!-- Clicking the backdrop closes the modal -->
    <form method="dialog" class="modal-backdrop">
        <button onclick="document.getElementById('htmx-modal').remove()">閉じる</button>
    </form>
</dialog>
<script>
    /**
     * Note: TomSelect initialization and destruction are now handled globally
     * via the htmx:afterSwap event listener in base_custom.js.
     * This ensures that any content injected or updated via HTMX (like this modal
     * re-rendering on validation error) is automatically processed.
     */
    (function() {
        const form = document.getElementById('modal-form');
        if (!form) return;
        // Logic for specialized modal-only behaviors can be added here.
    }());
</script>
