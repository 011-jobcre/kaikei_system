<!-- Generic HTMX modal for master-data create/edit forms.
     Injected into <body> via hx-target="body" hx-swap="beforeend".
     The 'title' and 'action_url' context variables must be provided by the view. -->
<dialog id="htmx-modal" class="modal modal-open">
    <div class="modal-box w-11/12 max-w-2xl relative">
        <!-- Close button: removes the dialog element from the DOM entirely -->
        <button onclick="document.getElementById('htmx-modal').remove()"
                class="btn-ghost-x-close">✕</button>
        <h3 class="font-bold text-xl mb-4">{{ title }}</h3>
        <form method="post"
              action="{{ action_url }}"
              hx-post="{{ action_url }}"
              hx-swap="none"
              id="modal-form"
              novalidate>
            {% csrf_token %}
            <div class="space-y-4">
                {% for field in form %}
                    {% include "includes/form_row.html" with field=field %}
                {% endfor %}
            </div>
            <!-- Non-field (form-level) validation errors -->
            {% if form.non_field_errors %}
                <div class="alert alert-error mt-4 text-sm gap-2">
                    <i class="fa-solid fa-triangle-exclamation shrink-0"></i>
                    <span>{{ form.non_field_errors|join:", " }}</span>
                </div>
            {% endif %}
            <div class="modal-action justify-end gap-3">
                <button type="button"
                        onclick="document.getElementById('htmx-modal').remove()"
                        class="btn-ghost-cancel min-w-24">キャンセル</button>
                <button type="submit" class="btn btn-primary min-w-24 gap-2">
                    <i class="fa-regular fa-floppy-disk"></i>保存
                </button>
            </div>
        </form>
    </div>
</dialog>
<script>
    // ── Client-side validation for master-data modal forms ──────────────────────────
    // Provides immediate visual feedback by highlighting required fields before the
    // form is submitted to the server.  Django's server-side validation remains the
    // authoritative check; this JS layer is purely a UX convenience.
    (function() {
        const form = document.getElementById('modal-form');
        if (!form) return;

        /**
         * Validates a single form field element.
         * Adds a red error label below the field if it is required but empty.
         * Removes the error label once the field has a value.
         *
         * @param {HTMLElement} el  The input/select/textarea element to validate.
         * @returns {boolean}       True when the field value is acceptable.
         */
        function validateField(el) {
            const wrapper = el.closest('.form-control');
            if (!wrapper) return true;

            // Remove any existing client-side error label before re-validating
            const prev = wrapper.querySelector('.js-field-error');
            if (prev) prev.remove();

            const isEmpty = el.type !== 'checkbox' && !el.value.trim();
            if (el.required && isEmpty) {
                // Apply error border styling
                el.classList.add('border-error');
                // Insert the error message below the field
                const msg = document.createElement('div');
                msg.className = 'label pt-1 js-field-error';
                msg.innerHTML =
                    '<span class="label-text-alt text-error flex items-center gap-1">' +
                    '<i class="fa-solid fa-circle-exclamation text-sm"></i>' +
                    'この項目は必須です。</span>';
                el.insertAdjacentElement('afterend', msg);
                return false;
            }
            // Clear error styling once the field is valid
            el.classList.remove('border-error');
            return true;
        }

        // Validate a field immediately when the user leaves it (blur)
        // and again on every keystroke if the field was already errored.
        form.querySelectorAll('input, select, textarea').forEach(el => {
            el.addEventListener('blur', () => validateField(el));
            el.addEventListener('input', () => {
                if (el.classList.contains('border-error')) validateField(el);
            });
            el.addEventListener('change', () => {
                if (el.classList.contains('border-error')) validateField(el);
            });
        });

        // Run validation on all fields when the user clicks Submit.
        // We do NOT call e.preventDefault() — the server is the authority.
        form.addEventListener('submit', () => {
            form.querySelectorAll('input, select, textarea').forEach(el => validateField(el));
        });
    }());
</script>
