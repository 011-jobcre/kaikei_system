{% extends "layout_main.html" %}
{% block title %}
    補助科目マスタ | 会計システム
{% endblock title %}
{% block page_header %}
    補助科目マスタ
{% endblock page_header %}
{% block content %}
    <div class="space-y-4">
        <!-- Toolbar: search/filter controls + new-record button -->
        <div class="flex flex-col lg:flex-row items-stretch lg:items-center justify-between gap-3 bg-base-100 p-3 rounded-box shadow-sm border border-base-300">
            <form method="get"
                  class="flex flex-wrap lg:flex-nowrap items-center gap-2 w-full">
                <!-- Keyword search: matches sub-account code or name -->
                <div class="relative w-full lg:w-1/5">
                    <i class="fa-solid fa-magnifying-glass absolute z-10 left-4 top-1/2 -translate-y-1/2 text-base-content/50"></i>
                    <input type="text"
                           name="q"
                           value="{{ q }}"
                           placeholder="補助科目コード・名で検索"
                           class="input input-sm pl-11 outline-none w-full" />
                </div>
                <!-- Filter by parent account -->
                <label class="select select-sm outline-none cursor-pointer w-full lg:w-1/5">
                    <span class="label min-w-20">勘定科目</span>
                    <select name="kamoku" class="tomselect">
                        <option value="">全て</option>
                        {% for k in kamoku_choices %}
                            <option value="{{ k.pk }}"
                                    {% if kamoku_id == k.pk|stringformat:"s" %}selected{% endif %}>
                                {{ k.code }} {{ k.name }} [{{ k.furigana|default:'' }}]
                            </option>
                        {% endfor %}
                    </select>
                </label>
                <div class="flex items-center gap-2 w-full lg:w-auto justify-end lg:justify-start">
                    <button type="submit" class="btn-search">
                        <i class="fa-solid fa-magnifying-glass"></i>検索
                    </button>
                    <a href="{% url 'master:hojo-list' %}" class="btn-clear">クリア</a>
                </div>
            </form>
            {% if is_admin %}
                <button hx-get="{% url 'master:hojo-create' %}"
                        hx-target="body"
                        hx-swap="beforeend"
                        class="btn-submit">
                    <i class="fa-solid fa-plus"></i>新規登録
                </button>
            {% endif %}
        </div>
        <!-- Data Table HTMX-enabled for dynamic updates -->
        {% include "master/partials/hojo_list_table.html" %}
    </div>
{% endblock content %}
