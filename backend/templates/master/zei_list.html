{% extends "layout_main.html" %}
{% block title %}
    消費税率マスタ | 会計システム
{% endblock title %}
{% block page_header %}
    消費税率マスタ
{% endblock page_header %}
{% block content %}
    <div class="space-y-4" x-data>
        <!-- ── Toolbar: new-record button only (small dataset, no search needed) ── -->
        <div class="flex justify-end bg-base-100 p-4 rounded-box shadow-sm border border-base-300">
            <button hx-get="{% url 'master:zei-create' %}"
                    hx-target="body"
                    hx-swap="beforeend"
                    class="btn btn-primary gap-2 w-full md:w-auto">
                <i class="fa-solid fa-plus"></i>新規登録
            </button>
        </div>
        <!-- ── Data Table: HTMX-enabled for dynamic updates ─────────────────────── -->
        {% include "master/partials/zei_table.html" %}
    </div>
{% endblock content %}
