{% extends "layout_main.html" %}
{% block title %}
    仕訳一覧 | 会計システム
{% endblock title %}
{% block page_header %}
    仕訳一覧
{% endblock page_header %}
{% block content %}
    <div class="space-y-4" x-data>
        <!-- Toolbar: filters + create actions -->
        <div class="flex flex-col md:flex-row items-stretch md:items-center justify-between gap-3 bg-base-100 p-4 rounded-box shadow-sm border border-base-300">
            <form method="get"
                  class="flex flex-wrap md:flex-nowrap items-center gap-2 w-full">
                <!-- Keyword search -->
                <input type="text"
                       name="q"
                       value="{{ q }}"
                       placeholder="伝票No・摘要検索"
                       class="input text-neutral w-full md:w-1/5" />
                <!-- Date range -->
                <div class="flex items-center gap-1">
                    <input type="date"
                           name="date_from"
                           value="{{ date_from }}"
                           class="input text-neutral w-full md:w-40" />
                    <span class="text-base-content/40 font-bold px-1">〜</span>
                    <input type="date"
                           name="date_to"
                           value="{{ date_to }}"
                           class="input text-neutral w-full md:w-40" />
                </div>
                <!-- Voucher type filter -->
                <label class="select cursor-pointer w-full md:w-1/5">
                    <span class="label min-w-20">伝票種別</span>
                    <select name="denpyo_type">
                        <option value="">全種別</option>
                        <option value="SHIWAKE" {% if denpyo_type == "SHIWAKE" %}selected{% endif %}>仕訳</option>
                        <option value="FURIKAE" {% if denpyo_type == "FURIKAE" %}selected{% endif %}>振替</option>
                    </select>
                </label>
                <div class="flex items-center gap-2 w-full md:w-auto justify-end md:justify-start">
                    <button type="submit" class="btn-search">
                        <i class="fa-solid fa-magnifying-glass"></i>検索
                    </button>
                    <a href="{% url 'journal:shiwake-list' %}" class="btn-clear">クリア</a>
                </div>
            </form>
            <!-- Create buttons -->
            {% if is_accountant %}
                <div class="flex gap-2 items-center justify-end">
                    <a href="{% url 'journal:shiwake-create' %}"
                       class="btn btn-primary gap-2 flex-1 md:flex-none">
                        <i class="fa-solid fa-book"></i>仕訳日記帳
                    </a>
                    <a href="{% url 'journal:furikae-create' %}"
                       class="btn btn-primary gap-2 flex-1 md:flex-none">
                        <i class="fa-solid fa-arrow-right-arrow-left"></i>振替伝票
                    </a>
                </div>
            {% endif %}
        </div>
        <!-- Data Table: HTMX-enabled for dynamic updates -->
        {% include "journal/partials/shiwake_table.html" %}
    </div>
{% endblock content %}
