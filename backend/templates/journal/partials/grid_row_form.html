<td class="p-0">
    {% csrf_token %}
    <input type="hidden"
           name="_row_prefix"
           value="row-{{ row_index|default:0 }}" />
    <input type="date"
           name="{{ form.date.html_name }}"
           value="{{ form.date.value|default:'' }}"
           class="grid-input"
           data-row="{{ row_index|default:0 }}"
           data-col="0"
           @keyup="handleKey($event, {{ row_index|default:0 }}, 0)" />
</td>
<td class="p-0 bg-info/10">
    <select name="{{ form.kari_kamoku.html_name }}"
            class="grid-select tomselect"
            :class="{ 'input-invalid': validationTick && !($el.value) }"
            data-row="{{ row_index|default:0 }}"
            data-col="1"
            @keyup="handleKey($event, {{ row_index|default:0 }}, 1)">
        {% for choice in form.kari_kamoku.field.choices %}
            <option value="{{ choice.0 }}"
                    {% if form.kari_kamoku.value|stringformat:"s" == choice.0|stringformat:"s" %}selected{% endif %}>
                {{ choice.1 }}
            </option>
        {% endfor %}
    </select>
</td>
<td class="p-0 bg-info/10">
    <select name="{{ form.kari_hojo.html_name }}"
            class="grid-select tomselect"
            data-row="{{ row_index|default:0 }}"

            @keyup="handleKey($event, {{ row_index|default:0 }}, 2)">
        {% for choice in form.kari_hojo.field.choices %}
            <option value="{{ choice.0 }}"
                    {% if form.kari_hojo.value|stringformat:"s" == choice.0|stringformat:"s" %}selected{% endif %}>
                {{ choice.1 }}

</td>

           value="{{ form.kari_kingaku.value|default:'' }}"
           class="grid-input text-right font-bold"
           :class="{ 'input-invalid': validationTick && (!$el.value || parseFloat($el.value) <= 0) }"

<td class="p-0 border-base-300">
    <input type="text"
           name="{{ form.tekiyou.html_name }}"
           value="{{ form.tekiyou.value|default:'' }}"
           class="grid-input"
           data-row="{{ row_index|default:0 }}"
           data-col="9"
           @keyup="handleKey($event, {{ row_index|default:0 }}, 9)" />
</td>
<td class="text-center p-0 relative">
    <div class="flex items-center justify-center gap-1 h-full py-1">
        <button type="button"
                class="btn btn-ghost btn-xs text-primary"
                hx-post="{% url 'journal:shiwake-create' %}?row_index={{ row_index|default:0 }}"
                hx-target="closest tr"
                hx-swap="outerHTML"
                hx-include="closest tr"
                hx-indicator="closest tr"
                :class="{ 'opacity-30 cursor-not-allowed': rowHasError({{ row_index|default:0 }}) }"
                @click="return validateBeforeSave($event, {{ row_index|default:0 }})"
                title="保存">
            <i class="fa-solid fa-save"></i>
        </button>
        <button type="button"
                class="btn btn-ghost btn-xs text-error"
                @click="deleteRow({{ row_index|default:0 }})"
                title="行削除">
            <i class="fa-solid fa-trash-can"></i>
        </button>
    </div>
    <!-- Real-time Validation Tooltip/Icon -->
    <template x-if="rowHasError({{ row_index|default:0 }})">
        <div class="absolute right-0 top-0 mt-1 mr-1 z-10">
            <div class="badge badge-error badge-xs p-1 tooltip tooltip-left"
                 :data-tip="getRowError({{ row_index|default:0 }})">
                <i class="fa-solid fa-circle-exclamation text-[10px]"></i>
            </div>
        </div>
    </template>
    <span class="server-row-error hidden" data-row="{{ row_index|default:0 }}">
        {% if form.non_field_errors %}
            {{ form.non_field_errors.0 }}
        {% else %}
            {% for field in form %}
                {% if field.errors %}{{ field.errors.0 }}{% endif %}
            {% endfor %}
        {% endif %}
    </span>
</td>
