<script>
function shiwakeGrid() {
    return {
        validationTick: 0,
        rowErrors: {},
        _currentRowIdx: null,

        init() {
            this.revalidateAllRows();

            document.body.addEventListener('htmx:afterSwap', (evt) => {
                const target = evt.detail?.target;
                if (target && target.id && target.id.startsWith('row-')) {
                    const rowIdx = target.id.replace('row-', '');
                    delete this.rowErrors[rowIdx];
                }
                this.revalidateAllRows();
                this.validationTick++;
            });

            // Native input changes only revalidate; saving happens on blur/row exit.
            document.body.addEventListener('change', (e) => {
                if (e.target.closest('tr[id^="row-"]')) {
                    this.handleGlobalChange(e);
                }
            });

            document.body.addEventListener('input', (e) => {
                if (e.target.closest('tr[id^="row-"]')) {
                    this.handleGlobalChange(e);
                }
            });

            document.addEventListener('focusin', (e) => {
                const tr = e.target.closest('tr');
                if (tr && tr.id.startsWith('row-')) {
                    const newRowIdx = this.getRowIndex(e.target);
                    if (this._currentRowIdx !== null && this._currentRowIdx !== newRowIdx) {
                        this.triggerSaveIfValid(this._currentRowIdx);
                    }
                    this._currentRowIdx = newRowIdx;
                }
            });

            document.addEventListener('focusout', (e) => {
                const tr = e.target.closest('tr');
                if (!tr || !tr.id.startsWith('row-')) return;

                const rowIdx = this.getRowIndex(e.target);
                setTimeout(() => {
                    const active = document.activeElement;
                    if (active && tr.contains(active)) return;
                    if (this.hasOpenTomSelect(tr)) return;
                    this.triggerSaveIfValid(rowIdx);
                }, 0);
            });
        },

        handleGlobalChange(e) {
            this.validationTick++;
            this.revalidateAllRows();
        },

        triggerSaveIfValid(rowIdx) {
            const row = document.getElementById(`row-${rowIdx}`);
            if (!row || row.classList.contains('htmx-request')) return;
            
            const error = this.getRowError(rowIdx, true);
            if (!error) {
                if (!this.rowHasAnyInput(row)) return;
                htmx.trigger(row, 'row-save');
            }
        },

        revalidateAllRows() {
            const rows = document.querySelectorAll('#grid-rows > tr[id^="row-"]');
            rows.forEach(row => {
                const rowIdx = row.id.replace('row-', '');
                const error = this.getRowError(rowIdx);
                if (error) this.rowErrors[rowIdx] = error;
                else delete this.rowErrors[rowIdx];
            });
            this.rowErrors = { ...this.rowErrors };
        },

        rowHasAnyInput(row) {
            if (!row) return false;
            const inputs = row.querySelectorAll('input:not([type="hidden"]), select');
            return Array.from(inputs).some(el => {
                if (el.closest('.ts-wrapper') && el.tagName !== 'SELECT') return false;
                return el.value && el.value.trim() !== '';
            });
        },

        hasOpenTomSelect(row) {
            if (!row) return false;
            return !!row.querySelector('.ts-wrapper.dropdown-active');
        },

        getRowError(rowIdx, enforceRequired = false) {
            const row = document.getElementById(`row-${rowIdx}`);
            if (!row) return "";
            
            const prefix = `row-${rowIdx}`;
            const date = row.querySelector(`input[name="${prefix}-date"]`)?.value;
            const kariRaw = row.querySelector(`input[name="${prefix}-kari_kingaku"]`)?.value;
            const kashiRaw = row.querySelector(`input[name="${prefix}-kashi_kingaku"]`)?.value;
            
            const kari = parseFloat(kariRaw || "0");
            const kashi = parseFloat(kashiRaw || "0");

            if (!enforceRequired && !date && !kariRaw && !kashiRaw) return "";

            if (kariRaw || kashiRaw) {
                if (Math.abs(kari - kashi) > 0.01) {
                    return `貸借不一致 (${Math.abs(kari - kashi).toLocaleString()}円)`;
                }
            }
            
            return "";
        },
        rowHasError(rowIdx) {
            return !!this.rowErrors[rowIdx];
        },

        getRowIndex(el) {
            const tr = el.closest('tr');
            if (!tr) return 0;
            const match = tr.id.match(/row-(\d+)/);
            return match ? parseInt(match[1]) : 0;
        },

        handleGridKey(e) {
            const target = e.target;
            const row = target.dataset.row;
            const col = target.dataset.col;
            if (row === undefined || col === undefined) return;
            this.handleKey(e, parseInt(row), parseInt(col));
        },

        handleKey(e, rowIdx, colIdx) {
            const colCount = 10;
            const target = e.target;

            if (e.key === 'Enter' && target.tagName !== 'BUTTON') {
                e.preventDefault(); 
                if (colIdx === colCount - 1) this.focusCell(rowIdx + 1, 0);
                else this.focusCell(rowIdx, colIdx + 1);
            } else if (e.key === 'Tab') {
                // Let browser handle Tab nav if possible, or manual focus
                if (e.shiftKey) {
                    if (colIdx === 0 && rowIdx > 0) { e.preventDefault(); this.focusCell(rowIdx - 1, colCount - 1); }
                } else {
                    if (colIdx === colCount - 1) { e.preventDefault(); this.focusCell(rowIdx + 1, 0); }
                }
            } 
            else if (['ArrowUp', 'ArrowDown'].includes(e.key) && target.tagName !== 'SELECT') {
                e.preventDefault();
                this.focusCell(e.key === 'ArrowDown' ? rowIdx + 1 : rowIdx - 1, colIdx);
            }
        },

        focusCell(rowIdx, colIdx) {
            const targetRow = document.getElementById(`row-${rowIdx}`);
            if (!targetRow) return;
            const el = targetRow.querySelector(`[data-col="${colIdx}"]`);
            if (!el) return;
            setTimeout(() => {
                if (el.tomselect) {
                    el.tomselect.focus();
                    return;
                }
                el.focus();
                if (el.select && el.tagName === 'INPUT' && el.type === 'number') el.select();
            }, 10);
        },

        deleteRow(rowIdx) {
            const row = document.getElementById(`row-${rowIdx}`);
            if (row && confirm('削除しますか？')) {
                row.remove();
                delete this.rowErrors[rowIdx];
                this.revalidateAllRows();
            }
        }
    }
}

function getNextRowIndex() {
    const rows = document.querySelectorAll('#grid-rows > tr[id^="row-"]');
    let maxIdx = -1;
    rows.forEach(r => {
        const idx = parseInt(r.id.replace('row-', ''));
        if (!isNaN(idx) && idx > maxIdx) maxIdx = idx;
    });
    return maxIdx + 1;
}
</script>
