<tr id="{{ form.prefix }}"
    class="relative"
    :class="{ 'bg-error/10': rowHasError(getRowIndex($el)) }"
    @keydown="handleGridKey($event)"
    hx-post="{% url 'journal:shiwake-create' %}"
    hx-trigger="row-save"
    hx-target="this"
    hx-swap="outerHTML"
    hx-include="this"
    hx-indicator="#indicator-{{ form.prefix }}">
    <td>
        {{ form.denpyo_id }}
        <input type="hidden" name="_row_prefix" value="{{ form.prefix }}" />
        <input type="date"
               name="{{ form.prefix }}-date"
               value="{{ form.date.value|date:'Y-m-d' }}"
               class="input input-sm outline-none w-full"
               data-row="{{ form.prefix|cut:"row-" }}"
               data-col="0"
               x-init="if (!$el.value) $el.value = new Date().toISOString().split('T')[0]" />
    </td>
    <td class="group-detail">{{ form.kari_kamoku }}</td>
    <td class="group-detail">{{ form.kari_hojo }}</td>
    <td class="group-detail relative">
        {% csrf_token %}
        <div x-show="rowHasError(getRowIndex($el))"
             class="absolute inset-0 z-60 tooltip tooltip-error tooltip-open pointer-events-none"
             :data-tip="rowErrors[getRowIndex($el)]"></div>
        <input type="number"
               name="{{ form.prefix }}-kari_kingaku"
               value="{{ form.kari_kingaku.value|default:'' }}"
               class="input input-sm outline-none w-full text-right font-mono"
               min="0"
               step="1"
               placeholder="0"
               data-row="{{ form.prefix|cut:"row-" }}"
               data-col="3" />
    </td>
    <td class="group-detail">{{ form.kari_zei }}</td>
    <td class="group-detail credit">{{ form.kashi_kamoku }}</td>
    <td class="group-detail credit">{{ form.kashi_hojo }}</td>
    <td class="group-detail credit">
        <input type="number"
               name="{{ form.prefix }}-kashi_kingaku"
               value="{{ form.kashi_kingaku.value|default:'' }}"
               class="input input-sm outline-none w-full text-right font-mono"
               min="0"
               step="1"
               placeholder="0"
               data-row="{{ form.prefix|cut:"row-" }}"
               data-col="7" />
    </td>
    <td class="group-detail credit">{{ form.kashi_zei }}</td>
    <td class="p-0 border-base-300">
        <input type="text"
               name="{{ form.prefix }}-tekiyou"
               value="{{ form.tekiyou.value|default:'' }}"
               class="input input-sm outline-none w-full"
               data-row="{{ form.prefix|cut:"row-" }}"
               data-col="9" />
    </td>
    <td class="text-center p-0 relative">
        <div class="flex items-center justify-center gap-1 h-full py-1">
            <div id="indicator-{{ form.prefix }}"
                 class="row-status-indicator htmx-indicator">
                <span class="loading loading-spinner loading-xs text-primary"></span>
            </div>
            <button type="button"
                    class="btn-delete-square"
                    @click="deleteRow(getRowIndex($el))"
                    title="削除">
                <i class="fa-solid fa-trash-can"></i>
            </button>
        </div>
    </td>
</tr>
