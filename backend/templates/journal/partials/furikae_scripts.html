<script>
// Alpine.js Component for Frontend Balance Tracking
document.addEventListener('alpine:init', () => {
    Alpine.data('furikaeForm', () => ({
        kariTotal: 0,
        kashiTotal: 0,
        
        init() {
            // Initial scan
            setTimeout(() => {
                this.initializeAllRows();
                this.calcBalance();
            }, 50);
            
            // HTMX integration: Re-init when new rows are added
            document.body.addEventListener('htmx:afterSwap', (e) => {
                const target = e.detail.target;
                if (target.id === 'meisai-rows' || target.closest('#meisai-rows')) {
                    this.initializeAllRows();
                    this.calcBalance();
                    if (typeof initTomSelects === 'function') initTomSelects(target);
                }
            });

            // Global input listener for real-time updates
            const form = document.querySelector('#furikae-form');
            if (form) {
                form.addEventListener('input', (e) => {
                    if (e.target.required) this.validateField(e.target);
                    this.calcBalance();
                });
                form.addEventListener('change', () => this.calcBalance());
            }
        },

        // Centralized row setup (replaces per-row script tags)
        initializeAllRows() {
            const rows = document.querySelectorAll('#meisai-rows tr[data-form-row]');
            rows.forEach((row, rowIdx) => {
                // 1. Assign Grid Coordinates
                const wrappers = row.querySelectorAll('[data-col-wrapper]');
                wrappers.forEach(wrapper => {
                    const colIdx = wrapper.dataset.colWrapper;
                    const el = wrapper.querySelector('select, input:not([type="hidden"])');
                    if (el) {
                        el.dataset.row = rowIdx;
                        el.dataset.col = colIdx;
                    }
                });

                // 2. Setup Side-switching logic (KA/SHI colors)
                const kariKashiSelect = row.querySelector('select[name*="kari_kashi"]');
                if (kariKashiSelect && !kariKashiSelect.dataset.initialized) {
                    const updateSide = () => {
                        const val = kariKashiSelect.tomselect ? kariKashiSelect.tomselect.getValue() : kariKashiSelect.value;
                        row.querySelectorAll('.ka-side').forEach(cell => {
                            cell.classList.toggle('group-detail', val === 'KA' || val === 'SHI');
                            cell.classList.toggle('credit', val === 'SHI');
                        });
                    };
                    kariKashiSelect.addEventListener('change', updateSide);
                    if (kariKashiSelect.tomselect) kariKashiSelect.tomselect.on('change', updateSide);
                    updateSide(); // Run once
                    kariKashiSelect.dataset.initialized = "true";
                }
            });
        },

        calcBalance() {
            let kari = 0, kashi = 0;
            const rows = document.querySelectorAll('#meisai-rows tr:not([style*="display: none"])');
            rows.forEach(row => {
                const select = row.querySelector('select[name$="-kari_kashi"]');
                const input = row.querySelector('input[name$="-kingaku"]');
                const del = row.querySelector('input[name$="-DELETE"]');
                if (!del || !del.checked) {
                    const val = parseFloat(input?.value) || 0;
                    if (select?.value === 'KA') kari += val;
                    else if (select?.value === 'SHI') kashi += val;
                }
            });
            this.kariTotal = kari;
            this.kashiTotal = kashi;
            
            // Sync totals to hidden fields
            document.querySelectorAll('input[name="kari"], input[name="kashi"]').forEach(el => {
                el.value = (el.name === 'kari' ? kari : kashi);
            });
            
            // AJAX Balance Bar Update
            if (typeof htmx !== 'undefined') {
                const bar = document.getElementById('balance-bar');
                if (bar) htmx.ajax('GET', '{% url "journal:balance-check" %}', {
                    target: '#balance-bar',
                    values: { kari, kashi }
                });
            }
        },
        
        isBalanced() { return this.kariTotal > 0 && this.kariTotal === this.kashiTotal; },

        handleGridKey(e) {
            const target = e.target;
            const row = target.dataset.row, col = target.dataset.col;
            if (row === undefined || col === undefined) return;
            this.handleKey(e, parseInt(row), parseInt(col));
        },

        handleKey(e, rowIdx, colIdx) {
            const colCount = 8;
            const target = e.target;
            const ts = target.parentElement?.querySelector('select')?.tomselect || target.tomselect;

            if ((e.key === 'Enter' && target.tagName !== 'BUTTON') || e.key === 'Tab') {
                if (e.key === 'Enter' && ts && ts.isOpen) return;

                e.preventDefault();
                if (e.key === 'Tab') e.stopPropagation();
                if (ts && ts.isOpen) ts.close();

                if (e.shiftKey) {
                    if (colIdx === 0 && rowIdx > 0) this.focusCell(rowIdx - 1, colCount - 1);
                    else if (colIdx > 0) this.focusCell(rowIdx, colIdx - 1);
                } else {
                    if (colIdx === colCount - 1) this.focusCell(rowIdx + 1, 0);
                    else this.focusCell(rowIdx, colIdx + 1);
                }
            } else if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                if (ts && ts.isOpen) return;
                if (e.key === 'ArrowRight' && target.tagName !== 'SELECT' && target.selectionEnd === target.value.length) {
                    e.preventDefault(); this.focusCell(rowIdx, colIdx + 1);
                } else if (e.key === 'ArrowLeft' && target.tagName !== 'SELECT' && target.selectionStart === 0) {
                    e.preventDefault(); this.focusCell(rowIdx, colIdx - 1);
                } else if (e.key === 'ArrowDown' && target.tagName !== 'SELECT') {
                    e.preventDefault(); this.focusCell(rowIdx + 1, colIdx);
                } else if (e.key === 'ArrowUp' && target.tagName !== 'SELECT') {
                    e.preventDefault(); this.focusCell(rowIdx - 1, colIdx);
                }
            }
        },

        focusCell(row, col) {
            const el = document.querySelector(`#meisai-rows [data-row="${row}"][data-col="${col}"]`);
            if (!el) return;
            requestAnimationFrame(() => {
                setTimeout(() => {
                    if (el.tomselect) el.tomselect.focus();
                    else {
                        el.focus();
                        if (el.select && el.tagName === 'INPUT' && el.type === 'number') el.select();
                    }
                }, 10);
            });
        },
        
        validateField(el) {
            el.classList.toggle('border-error', el.required && !el.value.trim());
        }
    }));
});

// Django Formset Dynamic Index Management
function getNextFormIndex() {
    let el = document.getElementById('id_meisai-TOTAL_FORMS');
    if (!el) return 0;
    return parseInt(el.value);
}

function incrementFormIndex() {
    let el = document.getElementById('id_meisai-TOTAL_FORMS');
    if (el) {
        el.value = parseInt(el.value) + 1;
    }
}

// Row Deletion Handler
function removeRow(btn) {
    const row = btn.closest('tr');
    const delInput = row.querySelector('input[name$="-DELETE"]');
    
    if (delInput) {
        // If the row exists in Django DB, mark it for deletion and hide it
        delInput.checked = true;
        row.style.display = 'none';
    } else {
        // If it is a newly added row that hasn't been saved, completely remove it
        row.remove();
    }
    
    // Recalculate balance using whichever active alpine scope exists
    const container = document.querySelector('#htmx-modal') || document.querySelector('.max-w-6xl.mx-auto');
    if (container && container.__x && container.__x.$data) {
        container.__x.$data.calcBalance();
    } else {
        // Fallback to querySelector approach for v3
        const alpineData = document.querySelector('[x-data]') && document.querySelector('[x-data]').__x && document.querySelector('[x-data]').__x.$data;
        if (alpineData) alpineData.calcBalance();
    }
}
</script>
