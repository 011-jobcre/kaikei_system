<div class="flex flex-col md:flex-row items-center justify-center text-sm gap-2 mt-2">
    {% load number_filters %}
    <div class="flex flex-wrap md:flex-nowrap gap-2">
        <div class="rounded-xl bg-base-300/40 px-4 py-1">
            借方合計: <span class="font-money">{{ kari_total|format_number }}</span> 円
        </div>
        <div class="rounded-xl bg-base-300/40 px-4 py-1">
            貸方合計: <span class="font-money">{{ kashi_total|format_number }}</span> 円
        </div>
    </div>
    {% if balanced and kari_total > 0 %}
        <div class="text-success font-bold flex items-center gap-1.5">
            <i class="fa-solid fa-circle-check"></i>
            貸借一致
        </div>
    {% elif diff != 0 %}
        <div class="text-error font-bold flex items-center gap-1.5">
            <i class="fa-solid fa-circle-exclamation"></i>
            差額: {{ diff|format_number }} 円
        </div>
    {% else %}
        <div class="text-base-content/40 font-medium">仕訳明細を入力してください</div>
    {% endif %}
</div>
