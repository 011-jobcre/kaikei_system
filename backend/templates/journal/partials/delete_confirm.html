<!-- Delete confirmation modal — injected into <body> via HTMX beforeend.
     'object' and 'delete_url' context variables must be provided by the view. -->
<dialog id="htmx-modal" class="modal modal-open">
    <div class="modal-box {% if not messages %}max-w-xl{% else %}max-w-2xl{% endif %}">
        <!-- Close button -->
        <button onclick="document.getElementById('htmx-modal').remove()"
                class="btn-x-close">✕</button>
        {% if messages %}
            <div class="mt-8">{% include "includes/messages_inline.html" %}</div>
        {% endif %}
        <!-- Warning illustration and message -->
        <div class="flex flex-col items-center gap-3 pt-4 text-center">
            <div class="w-16 h-16 rounded-full bg-error/10 flex items-center justify-center">
                <i class="fa-solid fa-triangle-exclamation text-error text-3xl"></i>
            </div>
            <h3 class="font-bold text-lg text-error">削除の確認</h3>
            <p>
                伝票 <strong>{{ object.denpyo_no }}</strong> を削除してもよろしいですか？
            </p>
            <p class="text-sm text-base-content/40">削除したデータは元に戻せません。関連する仕訳明細もすべて削除されます。</p>
        </div>
        <!-- Action buttons -->
        <div class="modal-action justify-center gap-3">
            <button onclick="document.getElementById('htmx-modal').remove()"
                    class="btn-cancel min-w-24">キャンセル</button>
            <!-- Deletion form — HTMX POST so the list refreshes without a full reload -->
            <form method="post"
                  action="{% url 'journal:denpyo-delete' object.pk %}"
                  hx-post="{% url 'journal:denpyo-delete' object.pk %}"
                  hx-target="#htmx-modal"
                  hx-swap="innerHTML">
                {% csrf_token %}
                <button type="submit" class="btn btn-error min-w-24 gap-2">
                    <i class="fa-solid fa-trash-can"></i>
                    削除
                </button>
            </form>
        </div>
    </div>
    <!-- Clicking the backdrop closes the modal -->
    <form method="dialog" class="modal-backdrop">
        <button onclick="document.getElementById('htmx-modal').remove()">閉じる</button>
    </form>
</dialog>
