<!-- 伝票削除確認モーダル -->
<dialog id="htmx-modal" class="modal modal-open">
    <div class="modal-box">
        <button onclick="document.getElementById('htmx-modal').remove()"
                class="btn btn-ghost btn-sm btn-circle absolute right-3 top-3">✕</button>
        <h3 class="font-bold text-lg text-error text-center">削除の確認</h3>
        <p class="py-4 text-base-content text-center">
            伝票 <strong>{{ object.denpyo_no }}</strong> を削除してもよろしいですか？
            <br />
            <span class="text-sm text-base-content/60">削除したデータは元に戻せません。関連する仕訳明細もすべて削除されます。</span>
        </p>
        <div class="modal-action">
            <button onclick="document.getElementById('htmx-modal').remove()"
                    class="btn-ghost-cancel">キャンセル</button>
            <form method="post"
                  action="{% url 'journal:denpyo-delete' object.pk %}"
                  hx-post="{% url 'journal:denpyo-delete' object.pk %}"
                  hx-swap="none">
                {% csrf_token %}
                <button type="submit" class="btn btn-error">削除</button>
            </form>
        </div>
    </div>
</dialog>
