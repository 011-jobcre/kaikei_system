{% if messages %}
    <div id="toast-container"
         class="toast toast-end z-50"
         x-data="{}"
         x-init="setTimeout(() => $el.remove(), 4000)">
        {% for message in messages %}
            <div class="alert {{ message.tags }} shadow-lg max-w-sm">
                <span class="text-sm">{{ message }}</span>
            </div>
        {% endfor %}
    </div>
{% endif %}
